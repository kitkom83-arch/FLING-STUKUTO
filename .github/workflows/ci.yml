name: Safe CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  safe-ci:
    name: Static safety checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NODE_ENV: test
      APP_ENV: local-test
      DATABASE_URL: postgresql://localhost:5432/pg77_ci?schema=public
      GAME_PROVIDER_MODE: mock
      PAYMENT_PROVIDER_MODE: mock
      BANK_STATEMENT_MODE: mock
      SMS_PROVIDER_MODE: mock
      SLIP_OCR_MODE: mock
      PRISMA_HIDE_UPDATE_MESSAGE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Project syntax and safety check
        run: npm run check

      - name: Staging preflight dry run
        run: npm run staging:preflight

      - name: Staging release readiness static smoke
        run: npm run smoke:staging-release-readiness

      - name: Local smoke syntax check
        run: |
          node --check src/local-smoke-tests/stagingPreflight.js
          node --check src/local-smoke-tests/stagingReleaseReadinessSmoke.js
          node --check src/local-smoke-tests/moneyFlowSmoke.js
          node --check src/local-smoke-tests/coreApiSmoke.js
          node --check src/local-smoke-tests/financialNegativeSmoke.js
          node --check src/local-smoke-tests/promotionClaimSmoke.js
          node --check src/local-smoke-tests/gameTransferSmoke.js
          node --check src/local-smoke-tests/adminReportsConfigSmoke.js
          node --check src/local-smoke-tests/bankModuleSmoke.js
          node --check src/local-smoke-tests/adminPermissionSmoke.js
          node --check src/local-smoke-tests/adminRoleManagementSmoke.js
          node --check src/local-smoke-tests/adminWorkScheduleSmoke.js
          node --check src/local-smoke-tests/adminWorkScheduleUiSmoke.js
          node --check src/local-smoke-tests/adminAuditSecuritySmoke.js
          node --check src/local-smoke-tests/adminWheelRuntimeSmoke.js
          node --check src/local-smoke-tests/stagingSmoke.js
          node --check src/local-smoke-tests/runAllLocalSmoke.js

      - name: Secret-shaped value scan
        shell: bash
        run: |
          db_proto='postgres''ql://'
          db_with_password="${db_proto}[^:@]+:[^@]+@"
          jwt_prefix='e''yJ'
          api_key_prefix='s''k-'
          db_assignment='DATABASE_URL[[:space:]]*='
          pattern="${db_with_password}|Bearer[[:space:]]+|${jwt_prefix}|${api_key_prefix}|${db_assignment}"

          if grep -RInE "$pattern" package.json README.md src/local-smoke-tests .github docs; then
            echo "Secret-shaped value found."
            exit 1
          fi
          echo "No secret-shaped values found."
